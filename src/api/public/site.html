function t(path){return path.split(".").reduce((obj,key)=>obj?.[key],I18N[state.locale])}
function setLocale(locale){state.locale=locale==="en"?"en":"tr";localStorage.setItem(LOCALE_KEY,state.locale);render()}
function syncChrome(){document.documentElement.lang=state.locale;document.querySelectorAll("[data-i18n]").forEach(el=>{const v=t(el.dataset.i18n);if(v)el.textContent=v});document.querySelector("#localeTr").classList.toggle("active",state.locale==="tr");document.querySelector("#localeEn").classList.toggle("active",state.locale==="en");document.querySelectorAll("[data-route]").forEach(el=>el.classList.toggle("active",location.pathname===el.dataset.route))}
function render(){syncChrome();document.querySelector("#topNav").classList.remove("open");const path=location.pathname,app=document.querySelector("#app");if(path==="/features")app.innerHTML=features();else if(path==="/commands")app.innerHTML=commands();else if(path==="/pricing")app.innerHTML=pricing();else if(path==="/faq")app.innerHTML=faq();else if(["/terms","/privacy","/refunds","/contact"].includes(path))app.innerHTML=legal(path.slice(1));else app.innerHTML=home();loadStats()}
function home(){return `${hero()}${statsSection()}${features(true)}`}
function hero(){const h=t("home"),icons=["check_circle","dashboard","language","lock"];return `<section class="hero"><div><span class="eyebrow"><span class="material-symbols-outlined">music_note</span>${h.badge}</span><h1 class="title">${h.titleA}<br><span class="gradient">${h.titleB}</span></h1><p class="lead">${h.subtitle}</p><div class="hero-actions"><a class="btn btn-primary" href="${DASHBOARD}">${t("common.openDashboard")} <span class="material-symbols-outlined">arrow_forward</span></a><a class="btn" href="/pricing">${t("common.viewPricing")}</a></div><div class="trust">${h.trust.map((x,i)=>`<span class="trust-item"><span class="material-symbols-outlined">${icons[i]}</span>${esc(x)}</span>`).join("")}</div></div><div class="preview-wrap"><div class="preview-glow"></div><div class="preview"><div class="toolbar"><span class="dot e"></span><span class="dot o"></span><span class="dot w"></span></div><img src="/logo/dashboard.jpg" alt="ShlimazlBot dashboard preview" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"><div class="fallback">[ Dashboard Screenshot Placeholder ]</div></div></div></section>`}
function statsSection(){const h=t("home");return `<section class="section"><div class="section-header"><h2>${h.statsTitle}</h2><p>${h.statsSubtitle}</p></div><div class="stats"><article class="stat card"><span>${t("stats.servers")}</span><strong id="stat-servers">9+</strong></article><article class="stat card"><span>${t("stats.users")}</span><strong id="stat-users">1K+</strong></article><article class="stat card"><span>${t("stats.status")}</span><strong id="stat-status" class="status">${t("stats.online")}</strong></article><article class="stat card"><span>${t("stats.plan")}</span><strong>${t("stats.ready")}</strong></article></div></section>`}
function features(compact=false){const f=t("features");return `<section class="section"><div class="section-header"><h2>${f.title}</h2><p>${f.subtitle}</p></div><div class="grid3">${f.items.slice(0,compact?3:f.items.length).map(item=>`<article class="feature card"><div class="feature-icon"><span class="material-symbols-outlined">${item[0]}</span></div><h3>${esc(item[1])}</h3><p>${esc(item[2])}</p></article>`).join("")}</div></section>`}
const COMMAND_EXTRAS={tr:{music:[["/sleeptimer","Müziği belirlediğin dakika sonunda otomatik durdurur."],["/playlist create","Özel isimle yeni playlist oluşturur."],["/playlist save","Mevcut kuyruğu playlist olarak kaydeder."],["/playlist manage","Playlist içine şarkı ekler, çıkarır veya playlisti siler."],["/playlist library","Playlistlerini ve beğenilen şarkılarını gösterir."]],general:[["/invite","ShlimazlBot davet bağlantısını gösterir."],["/premium","Premium durumunu görüntüler ve yönetim bağlantısını açar."]]},en:{music:[["/sleeptimer","Stop the music automatically after a selected number of minutes."],["/playlist create","Create a new playlist with a custom name."],["/playlist save","Save the current queue as a playlist."],["/playlist manage","Add, remove, or delete tracks in your playlist."],["/playlist library","View your playlists and liked songs."]],general:[["/invite","Show the ShlimazlBot invite link."],["/premium","View your premium status and open premium management."]]}};
function commandItemsWithExtras(c,active){const base=c.items[active]||[],extras=COMMAND_EXTRAS[state.locale]?.[active]||[],seen=new Set(base.map(item=>item[0]));return base.concat(extras.filter(item=>!seen.has(item[0])))}
function commands(){const c=t("commands"),keys=["music","general","settings","film"];const active=window.__commandCategory||"music";return `<section class="section"><div class="section-header"><h2>${c.title}</h2><p>${c.subtitle}</p></div><div class="command-layout"><aside class="command-tabs card">${keys.map(key=>`<button class="command-tab ${active===key?"active":""}" type="button" onclick="setCommandCategory('${key}')"><span class="material-symbols-outlined">${commandIcon(key)}</span>${esc(c.categories[key])}</button>`).join("")}</aside><div><p class="command-kicker">${esc(c.hint)}</p><div class="commands">${commandItemsWithExtras(c,active).map(item=>`<article class="command card"><span class="command-name">${esc(item[0])}</span><p>${esc(item[1])}</p></article>`).join("")}</div></div></div></section>`}
function pricing(){const p=t("pricing");return `<section class="section"><div class="section-header"><h2>${p.title}</h2><p>${p.subtitle}</p></div><div class="plans">${p.plans.map(plan=>`<article class="plan card ${plan[3]?"popular":""}">${plan[3]?`<span class="badge">${p.popular}</span>`:""}<h3>${esc(plan[0])}</h3><div class="price">${esc(plan[1])}</div><ul>${plan[2].map(f=>`<li>${esc(f)}</li>`).join("")}</ul><button class="btn btn-primary" type="button" onclick="location.href='${DASHBOARD}'">${t("common.choosePlan")}</button></article>`).join("")}</div></section>`}
function faq(){const f=t("faq");return `<section class="section"><div class="section-header"><h2>${f.title}</h2><p>${f.subtitle}</p></div><div class="faq-list">${f.items.map((item,i)=>`<article class="faq card ${i===0?"open":""}"><button class="faq-question" type="button" onclick="this.closest('.faq').classList.toggle('open')"><span>${esc(item[0])}</span><span class="material-symbols-outlined chevron">expand_more</span></button><div class="faq-answer">${esc(item[1])}</div></article>`).join("")}</div></section>`}
function legal(page){const title=t(`legal.${page}`),items=t(`pages.${page}`)||[];return `<section class="legal card"><span class="eyebrow">ShlimazlBot</span><h1>${title}</h1><ul>${items.map(item=>`<li>${esc(item)}</li>`).join("")}</ul></section>`}
async function loadStats(){try{const r=await fetch("/api/bot/public-stats",{credentials:"include"});if(!r.ok)return;const s=await r.json(),servers=document.querySelector("#stat-servers"),users=document.querySelector("#stat-users"),status=document.querySelector("#stat-status");if(servers)servers.textContent=formatCount(s.guilds||9);if(users)users.textContent=formatCount(s.reachableUsers||1000);if(status)status.textContent=s.status==="online"?t("stats.online"):t("stats.ready")}catch{}}
function formatCount(v){const n=Number(v)||0;if(n>=1e6)return`${(n/1e6).toFixed(1)}M+`;if(n>=1e3)return`${Math.floor(n/1e3)}K+`;return`${n}+`}
function setCommandCategory(category){window.__commandCategory=category;render();window.scrollTo({top:0,behavior:"smooth"})}
function commandIcon(category){return{music:"music_note",general:"apps",settings:"tune",film:"movie"}[category]||"apps"}
function esc(v){return String(v??"").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"}[c]))}
window.addEventListener("popstate",render);document.addEventListener("click",e=>{const link=e.target.closest("a[href^='/']");if(!link||link.target||e.metaKey||e.ctrlKey||e.shiftKey||e.altKey)return;const href=link.getAttribute("href");if(href==="/dashboard"||href.startsWith("/dashboard?"))return;e.preventDefault();history.pushState(null,"",href);render();window.scrollTo({top:0,behavior:"smooth"})});
render();
</script>
